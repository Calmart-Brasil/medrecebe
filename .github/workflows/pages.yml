name: Publicar beta web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Preparar arquivos públicos
        run: |
          mkdir _site
          cp index.html app.js styles.css sw.js manifest.webmanifest privacidade.html suporte.html .nojekyll _site/
          cp -R assets _site/assets

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
