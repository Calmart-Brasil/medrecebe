name: Publicar MedRecebe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v6

      - name: Preparar arquivos públicos
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          mkdir _site
          cp index.html app.html landing.css legal.css termos.html cancelamento.html app.js reconciliation-pdf.js cloud.js frame-guard.js runtime-config.js styles.css sw.js manifest.webmanifest privacidade.html suporte.html admin.html admin.js admin.css .nojekyll _site/
          cp -R assets _site/assets
          cp -R data _site/data
          node -e "const fs=require('fs');const config={supabaseUrl:process.env.SUPABASE_URL||'',supabasePublishableKey:process.env.SUPABASE_PUBLISHABLE_KEY||''};fs.writeFileSync('_site/runtime-config.js','window.MEDRECEBE_CONFIG = Object.freeze('+JSON.stringify(config,null,2)+');\n')"

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
